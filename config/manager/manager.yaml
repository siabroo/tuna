apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuna-manager
  namespace: tuna-system
  labels:
    app.kubernetes.io/name: tuna
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tuna
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tuna
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: tuna-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/siabroo/tuna:dev   # overridden by kustomize/release
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --prometheus-url=$(PROMETHEUS_URL)
            - --auth-mode=$(AUTH_MODE)
            - --analysis-interval=$(ANALYSIS_INTERVAL)
            - --selector-mode=k8s-api
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus-operated.monitoring.svc:9090
            - name: AUTH_MODE
              value: none
            - name: ANALYSIS_INTERVAL
              value: 5m
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
