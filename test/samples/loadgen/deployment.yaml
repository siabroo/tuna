apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  namespace: default
  annotations:
    tuna.siabroo.github.io/analyze: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      containers:
        - name: app
          image: loadgen:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Initial load — overrideable at runtime via /load HTTP API.
            - name: LOAD_CPU_PERCENT
              value: "30"
            - name: LOAD_MEM_MB
              value: "40"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
