apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-go-app
  namespace: default
  annotations:
    tuna.siabroo.github.io/analyze: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-go-app
  template:
    metadata:
      labels:
        app: sample-go-app
    spec:
      containers:
        - name: app
          image: sample-go-app:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LOAD_CPU_PERCENT
              value: "30"
            - name: LOAD_MEM_MB
              value: "40"
          # Intentionally tight to give tuna something to recommend
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
