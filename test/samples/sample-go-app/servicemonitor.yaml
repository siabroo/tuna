apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sample-go-app
  namespace: default
  labels:
    release: kube-prom   # match kube-prometheus-stack helm release label
spec:
  selector:
    matchLabels:
      app: sample-go-app
  endpoints:
    - port: http
      interval: 15s
      path: /metrics
