run:
  timeout: 5m
  go: "1.26"
  build-tags:
    - e2e

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace

linters-settings:
  gosec:
    excludes:
      - G104 # ignore unhandled errors — many Operator patterns log+continue

issues:
  exclude-rules:
    - path: _test\.go
      linters: [unparam, unused]
