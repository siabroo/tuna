version: "2"

run:
  timeout: 5m
  build-tags:
    - e2e

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    gosec:
      excludes:
        - G104
        - G101
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - unused
