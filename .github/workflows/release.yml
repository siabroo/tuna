name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: echo "IMG=ghcr.io/${REPO_OWNER}/tuna:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          IMG: ${{ steps.tag.outputs.IMG }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          docker build -t "$IMG" .
          docker tag "$IMG" "ghcr.io/${REPO_OWNER}/tuna:latest"
          docker push "$IMG"
          docker push "ghcr.io/${REPO_OWNER}/tuna:latest"

      - name: Build install manifest
        env:
          IMG: ${{ steps.tag.outputs.IMG }}
        run: |
          cd config/manager && go run sigs.k8s.io/kustomize/kustomize/v5 edit set image ghcr.io/siabroo/tuna="$IMG" && cd ../..
          make release-manifest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
          generate_release_notes: true
