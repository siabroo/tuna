name: e2e
on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  e2e:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Run e2e
        run: |
          make e2e-up
          make e2e
      - name: Teardown cluster
        if: always()
        run: make e2e-down
